name: Deploy to Coolify

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger Coolify Deploy
        run: |
          echo "Deploying quiz-manager → Coolify uuid=yssco8cc800ow880w0wo48o0"
          curl -s -f -X POST \
            "https://coolify.ofshore.dev/api/v1/deploy?uuid=yssco8cc800ow880w0wo48o0&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}" \
            && echo "✅ Deploy triggered" || echo "⚠️ Deploy trigger failed (non-critical)"
